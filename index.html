<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - ACOLHE IF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.cadastro.css">
</head>
<body class="page-cadastro">

<header class="top">
  <div class="logo">ACOLHE <span>IF</span></div>
  
</header>

<main class="container">
  <h1>Cadastro</h1>

  <form class="form-grid">

    <div class="field col-2">
      <label>Nome completo</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Idade</label>
      <input type="number">
    </div>

    <div class="field">
      <label>Cor/Raça</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Gênero</label>
      <select>
        <option></option>
        <option>Feminino</option>
        <option>Masculino</option>
        <option>Outro</option>
      </select>
    </div>

    <div class="field col-2">
      <label>Matrícula</label>
      <input type="text">
    </div>

    <div class="field">
      <label>Senha</label>
      <input type="password">
    </div>

    <div class="field password">
      <label>Confirmar senha</label>
      <input type="password">
    </div>
    <a href="login.html" class="btn-main col-full">Registrar-me</a>

  </form>
</main>

</body>
</html>
